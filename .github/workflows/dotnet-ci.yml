name: dotnet-ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore GalacticTrader.sln

      - name: Build
        run: dotnet build GalacticTrader.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test GalacticTrader.sln --configuration Release --no-build --verbosity normal
