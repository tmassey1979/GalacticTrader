name: dotnet-ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore GalacticTrader.sln

      - name: Build
        run: dotnet build GalacticTrader.sln --configuration Release --no-restore

      - name: Install dotnet-ef
        shell: pwsh
        run: |
          dotnet tool update --global dotnet-ef --version 9.0.0
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: EF Migration Drift Guardrail
        shell: pwsh
        env:
          ConnectionStrings__Default: Host=localhost;Database=galactictrader_ci_guardrail;Username=postgres;Password=postgres
        run: |
          dotnet ef migrations has-pending-model-changes --no-build --project src/Data/GalacticTrader.Data.csproj --startup-project src/API/GalacticTrader.API.csproj
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::EF model drift detected: update migrations for Data model changes."
            Write-Host "Create migration:"
            Write-Host "dotnet ef migrations add <MigrationName> --project src/Data/GalacticTrader.Data.csproj --startup-project src/API/GalacticTrader.API.csproj --output-dir Migrations"
            Write-Host "Re-run validation:"
            Write-Host "dotnet ef migrations has-pending-model-changes --project src/Data/GalacticTrader.Data.csproj --startup-project src/API/GalacticTrader.API.csproj"
            exit $LASTEXITCODE
          }

      - name: Performance Regression Gate (Route + Combat)
        run: >
          dotnet test tests/GalacticTrader.Tests/GalacticTrader.Tests.csproj
          --configuration Release
          --no-build
          --verbosity normal
          --filter "Category=Performance"

      - name: Performance Regression Gate (Representative API p95)
        run: >
          dotnet test tests/GalacticTrader.IntegrationTests/GalacticTrader.IntegrationTests.csproj
          --configuration Release
          --no-build
          --verbosity normal
          --filter "Category=Performance"

      - name: Unit Tests With Coverage Threshold
        run: >
          dotnet test tests/GalacticTrader.Tests/GalacticTrader.Tests.csproj
          --configuration Release
          --no-build
          --verbosity normal
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=TestResults/coverage/
          /p:Threshold=80
          /p:ThresholdType=line
          /p:ThresholdStat=total

      - name: Integration Tests
        run: dotnet test tests/GalacticTrader.IntegrationTests/GalacticTrader.IntegrationTests.csproj --configuration Release --no-build --verbosity normal

      - name: Gateway Integration Tests
        run: dotnet test tests/GalacticTrader.Gateway.Tests/GalacticTrader.Gateway.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install E2E Dependencies
        run: npm ci
        working-directory: tests/e2e

      - name: E2E Critical Flows
        run: npm run test:ci
        working-directory: tests/e2e
