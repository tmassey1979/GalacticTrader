name: dotnet-ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore GalacticTrader.sln

      - name: Build
        run: dotnet build GalacticTrader.sln --configuration Release --no-restore

      - name: Unit Tests With Coverage Threshold
        run: >
          dotnet test tests/GalacticTrader.Tests/GalacticTrader.Tests.csproj
          --configuration Release
          --no-build
          --verbosity normal
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=TestResults/coverage/
          /p:Threshold=80
          /p:ThresholdType=line
          /p:ThresholdStat=total

      - name: Desktop Frontend Tests
        run: dotnet test tests/GalacticTrader.Desktop.Tests/GalacticTrader.Desktop.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Integration Tests
        run: dotnet test tests/GalacticTrader.IntegrationTests/GalacticTrader.IntegrationTests.csproj --configuration Release --no-build --verbosity normal

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      - name: Frontend Unit Tests
        run: npm run test
        working-directory: frontend

      - name: Install E2E Dependencies
        run: npm ci
        working-directory: tests/e2e

      - name: E2E Critical Flows
        run: npm run test:ci
        working-directory: tests/e2e
