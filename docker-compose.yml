services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: galactictrader-postgres
    environment:
      POSTGRES_USER: galactic_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ChangeMeInProduction}
      POSTGRES_DB: galactictrader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U galactic_admin -d galactictrader"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - galactictrader-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: galactictrader-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "900", "1", "--save", "300", "10", "--save", "60", "10000"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - galactictrader-network

  # Keycloak Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: galactictrader-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: galactic_admin
      KC_DB_PASSWORD: ${DB_PASSWORD:-ChangeMeInProduction}
      KC_PROXY: edge
      KC_HOSTNAME: localhost:8180
    command: ["start-dev"]
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - galactictrader-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: galactictrader-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - galactictrader-network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: galactictrader-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ${GRAFANA_PLUGINS:-}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infrastructure/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - galactictrader-network

  # HashiCorp Vault (development mode)
  vault:
    image: hashicorp/vault:1.17
    container_name: galactictrader-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-root}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    command: vault server -dev -dev-root-token-id=${VAULT_DEV_ROOT_TOKEN:-root}
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD-SHELL", "VAULT_ADDR=http://127.0.0.1:8200 vault status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - galactictrader-network

  # Backend API
  api:
    image: ${API_IMAGE:-galactictrader-api:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: galactictrader-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=galactictrader;Username=galactic_admin;Password=${DB_PASSWORD:-ChangeMeInProduction}"
      Redis__Connection: "redis:6379"
      Keycloak__ServerUrl: "http://keycloak:8080"
      Keycloak__Realm: "galactictrader"
      Vault__Enabled: ${VAULT_ENABLED:-false}
      Vault__FailFast: "false"
      Vault__Address: "http://vault:8200"
      Vault__Token: ${VAULT_DEV_ROOT_TOKEN:-root}
      Vault__Mount: ${VAULT_MOUNT:-secret}
      Vault__Path: ${VAULT_PATH:-galactictrader/api}
      Vault__KvVersion: ${VAULT_KV_VERSION:-2}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
      vault:
        condition: service_started
    restart: unless-stopped
    networks:
      - galactictrader-network

  # API Gateway
  gateway:
    image: ${GATEWAY_IMAGE:-galactictrader-gateway:local}
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: galactictrader-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8081
      Gateway__ApiBaseUrl: "http://api:8080"
      Gateway__Jwt__Authority: "http://keycloak:8080/realms/galactictrader"
      Gateway__Jwt__Audience: "account"
      Gateway__Jwt__RequireHttpsMetadata: "false"
      Gateway__RateLimit__PermitLimit: "300"
      Gateway__RateLimit__WindowSeconds: "60"
    ports:
      - "8081:8081"
    depends_on:
      api:
        condition: service_started
      keycloak:
        condition: service_started
    restart: unless-stopped
    networks:
      - galactictrader-network

networks:
  galactictrader-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
